
<!DOCTYPE html>
<html lang="es">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        /* ===================== Utilidades ===================== */

        const fmt = (n) => {
            if (isNaN(n)) n = 0;
            return n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const uid = () => Math.random().toString(36).slice(2, 10);

        const CATEGORIAS = [
            "Maestranza y Servicios",
            "Administrativo \"C\"",
            "Administrativo \"B\"",
            "Administrativo \"A\"",
            "Maestranza \"C\"",
            "Maestranza \"B\"",
            "Maestranza \"A\"",
            "Cajero",
        ];

        // Jornadas soportadas y su fracción respecto de la jornada completa
        const JORNADA_FRACCION = {
            COMPLETA: 1,
            TRES_CUARTOS: 0.75,
            MEDIA: 0.5,
        };
        const JORNADA_LABEL = {
            COMPLETA: "Jornada completa",
            TRES_CUARTOS: "Tres cuartos de jornada",
            MEDIA: "Media jornada",
        };
        // Forma corta, para espacios reducidos (ej. la línea de categoría en el PDF)
        const JORNADA_LABEL_CORTO = {
            COMPLETA: "Completa",
            TRES_CUARTOS: "3/4 jornada",
            MEDIA: "Media jornada",
        };

        function fraccionJornada(jornada) {
            return JORNADA_FRACCION[jornada] !== undefined ? JORNADA_FRACCION[jornada] : 1;
        }

        function defaultEscalaGeneral() {
            const basicos = {};
            CATEGORIAS.forEach(c => { basicos[c] = ""; });
            return {
                basicos,
                noRemunerativo: "",
                noRemunerativoConcepto: "Asignación no remunerativa (paritaria)",
            };
        }

        // Número a letras (pesos argentinos)
        const UNIDADES = ["", "uno", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "nueve", "diez",
            "once", "doce", "trece", "catorce", "quince", "dieciséis", "diecisiete", "dieciocho", "diecinueve", "veinte"];
        const DECENAS = ["", "", "veinte", "treinta", "cuarenta", "cincuenta", "sesenta", "setenta", "ochenta", "noventa"];
        const CENTENAS = ["", "ciento", "doscientos", "trescientos", "cuatrocientos", "quinientos", "seiscientos", "setecientos", "ochocientos", "novecientos"];

        function tresDigitos(n) {
            if (n === 0) return "";
            if (n === 100) return "cien";
            let s = "";
            const c = Math.floor(n / 100), r = n % 100;
            if (c > 0) s += CENTENAS[c] + " ";
            if (r <= 20) s += UNIDADES[r];
            else {
                const d = Math.floor(r / 10), u = r % 10;
                s += DECENAS[d] + (u > 0 ? " y " + UNIDADES[u] : "");
            }
            return s.trim();
        }

        function numeroALetras(num) {
            num = Math.round(num);
            if (num === 0) return "cero";
            let partes = [];
            const millones = Math.floor(num / 1000000);
            const miles = Math.floor((num % 1000000) / 1000);
            const resto = num % 1000;
            if (millones > 0) partes.push((millones === 1 ? "un millón" : tresDigitos(millones) + " millones"));
            if (miles > 0) partes.push((miles === 1 ? "mil" : tresDigitos(miles) + " mil"));
            if (resto > 0) partes.push(tresDigitos(resto));
            return partes.join(" ").trim();
        }

        function pesosEnLetras(monto) {
            const entero = Math.floor(monto);
            const centavos = Math.round((monto - entero) * 100);
            const letrasEntero = numeroALetras(entero);
            const cap = letrasEntero.charAt(0).toUpperCase() + letrasEntero.slice(1);
            return `${cap} con ${centavos.toString().padStart(2, '0')}/100 pesos`;
        }

        /* ===================== Cálculo de liquidación ===================== */

        function calcularAntiguedadAnios(fechaIngreso, periodo) {
            if (!fechaIngreso) return 0;
            const ingreso = new Date(fechaIngreso + "T00:00:00");
            const [anio, mes] = (periodo || "").split("-").map(x => parseInt(x, 10));
            const refFecha = (anio && mes) ? new Date(anio, mes - 1, 1) : new Date();
            let anios = refFecha.getFullYear() - ingreso.getFullYear();
            const m = refFecha.getMonth() - ingreso.getMonth();
            if (m < 0) anios--;
            return Math.max(0, anios);
        }

        function calcularLiquidacion(emp, liq, escalaGeneral) {
            escalaGeneral = escalaGeneral || defaultEscalaGeneral();
            const jornada = emp.jornada || "COMPLETA";
            const fraccion = fraccionJornada(jornada);

            // Básico y no remunerativo: por defecto se toman de la escala salarial
            // general (según categoría) ajustados por la jornada del empleado.
            // Si la liquidación puntual desactiva la escala general, se usan los
            // valores cargados a mano para ese período.
            const usarEscala = liq.usarEscalaGeneral !== false;

            const basicoEscalaCategoria = parseFloat((escalaGeneral.basicos || {})[emp.categoria]) || 0;
            const basicoEscala = basicoEscalaCategoria * fraccion;
            const noRemEscala = (parseFloat(escalaGeneral.noRemunerativo) || 0) * fraccion;

            const basico = usarEscala ? basicoEscala : (parseFloat(liq.basico) || 0);
            const noRemunerativoBase = usarEscala ? noRemEscala : (parseFloat(liq.noRemunerativos) || 0);

            const aniosAntig = calcularAntiguedadAnios(emp.fechaIngreso, liq.periodo);
            const antigPct = Math.min(
                aniosAntig * (parseFloat(liq.antigPctPorAnio) || 1),
                35
            );
            const antigMonto = basico * antigPct / 100;

            const valorHora = basico > 0 ? basico / 200 : 0;
            const he50 = (parseFloat(liq.horasExtra50) || 0) * valorHora * 1.5;
            const he100 = (parseFloat(liq.horasExtra100) || 0) * valorHora * 2;

            const otrosRemun = parseFloat(liq.otrosRemunerativos) || 0;

            const brutoParaPresentismo = basico + antigMonto + he50 + he100 + otrosRemun;
            const presentismoMonto = liq.presentismo ? brutoParaPresentismo * 0.0833 : 0;

            const totalRemunerativo = brutoParaPresentismo + presentismoMonto;

            // El concepto no remunerativo también genera antigüedad y presentismo
            // (mismos porcentajes que sobre el básico), pero lo generado sigue
            // siendo no remunerativo: no entra a totalRemunerativo, por lo que no
            // afecta jubilación ni Ley 19.032. Solo impacta las deducciones que ya
            // afectaba el no remunerativo (obra social y cuota sindical), vía
            // baseAportes más abajo.
            const antigNoRemunMonto = noRemunerativoBase * antigPct / 100;
            const brutoNoRemunParaPresentismo = noRemunerativoBase + antigNoRemunMonto;
            const presentismoNoRemunMonto = liq.presentismo ? brutoNoRemunParaPresentismo * 0.0833 : 0;

            const noRemunerativo = brutoNoRemunParaPresentismo + presentismoNoRemunMonto;

            // Base imponible para la obra social

            const baseAportes = totalRemunerativo + noRemunerativo;

            // Aporte del 3%
            const jubilacion = totalRemunerativo * 0.11;
            const ley19032 = totalRemunerativo * 0.03;

            // Los trabajadores a jornada reducida aportan a la obra social sobre
            // una base ficta equivalente a la jornada completa (se "infla" la base
            // en proporción inversa a la fracción de jornada trabajada).
            const factorJornada = fraccion > 0 ? (1 / fraccion) : 1;
            const baseCalculoOS = baseAportes * factorJornada;

            const obraSocial = baseCalculoOS * 0.03;

            // Solo para informar en el recibo

            const sindical = emp.afiliadoSindicato ? baseAportes * 0.045 : 0;
            const otrasDeducciones = parseFloat(liq.otrasDeducciones) || 0;

            const totalDeducciones = jubilacion + ley19032 + obraSocial + sindical + otrasDeducciones;

            const totalBruto = totalRemunerativo + noRemunerativo;
            const neto = totalBruto - totalDeducciones;

            return {
                jornada, fraccion, usarEscala, basico, basicoEscala, noRemEscala,
                aniosAntig, antigPct, antigMonto, valorHora, he50, he100, otrosRemun,
                presentismoMonto, totalRemunerativo,
                noRemunerativoBase, antigNoRemunMonto, presentismoNoRemunMonto, noRemunerativo,
                jubilacion, ley19032, obraSocial, sindical, otrasDeducciones, totalDeducciones,
                totalBruto, neto
            };
        }

        /* ===================== Payload para Webhook (Make → Google Sheets) ===================== */

        function construirPayloadEmpleado(empresa, emp, liq, calc) {
            const n = (v) => Number((v || 0).toFixed(2));
            return {
                fecha_envio: new Date().toISOString(),
                empresa_razonSocial: empresa.razonSocial || "",
                empresa_cuit: empresa.cuit || "",
                empleado_nombre: emp.nombre || "",
                empleado_cuil: emp.cuil || "",
                empleado_legajo: emp.legajo || "",
                categoria: emp.categoria || "",
                jornada: JORNADA_LABEL[calc.jornada] || "",
                fecha_ingreso: emp.fechaIngreso || "",
                periodo: liq.periodoLabel || liq.periodo || "",
                fecha_pago: liq.fechaPago || "",
                basico: n(calc.basico),
                antiguedad_pct: n(calc.antigPct),
                antiguedad_monto: n(calc.antigMonto),
                presentismo_monto: n(calc.presentismoMonto),
                horas_extra_50: n(calc.he50),
                horas_extra_100: n(calc.he100),
                otras_remuneraciones_concepto: liq.otrosRemunerativosConcepto || "",
                otras_remuneraciones_monto: n(calc.otrosRemun),
                no_remunerativo_concepto: liq.noRemunerativosConcepto || "",
                no_remunerativo_base: n(calc.noRemunerativoBase),
                no_remunerativo_antiguedad: n(calc.antigNoRemunMonto),
                no_remunerativo_presentismo: n(calc.presentismoNoRemunMonto),
                no_remunerativo_total: n(calc.noRemunerativo),
                jubilacion: n(calc.jubilacion),
                ley_19032: n(calc.ley19032),
                obra_social: n(calc.obraSocial),
                cuota_sindical: n(calc.sindical),
                otras_deducciones_concepto: liq.otrasDeduccionesConcepto || "",
                otras_deducciones_monto: n(calc.otrasDeducciones),
                total_remunerativo: n(calc.totalRemunerativo),
                total_deducciones: n(calc.totalDeducciones),
                total_bruto: n(calc.totalBruto),
                neto_a_cobrar: n(calc.neto),
            };
        }

        async function enviarWebhook(url, payload) {
            try {
                const resp = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                return { ok: resp.ok, detalle: `HTTP ${resp.status}` };
            } catch (err) {
                return { ok: false, detalle: (err && err.message) ? err.message : "Error de red / CORS" };
            }
        }

        /* ===================== Generación de PDF ===================== */

        // Dibuja la página de un recibo (bloque ORIGINAL + DUPLICADO) en la
        // página actual del documento `doc`. Se usa tanto para emitir el PDF de
        // un solo empleado como para armar el PDF con todos los recibos juntos.
        function dibujarPaginaRecibo(doc, empresa, emp, liq, calc) {
            const W = 210;
            // Se quitó el texto legal que iba suelto al pie de la hoja (fuera de
            // los recibos) para poder estirar cada bloque y dar más aire a la firma.
            const BLOCK_H = 136;
            const TOP_MARGIN = 8;
            const GAP = 10;
            const y1 = TOP_MARGIN;
            const y2 = y1 + BLOCK_H + GAP;

            function bloque(y, tag) {
                const left = 14, right = W - 14;
                const bottom = y + BLOCK_H;
                doc.setDrawColor(20, 20, 20);
                doc.setLineWidth(0.4);
                doc.rect(left, y, right - left, BLOCK_H);

                // Header
                doc.setFont("times", "bold"); doc.setFontSize(12);
                doc.text(empresa.razonSocial || "[Razón Social]", left + 4, y + 8);
                doc.setFont("helvetica", "normal"); doc.setFontSize(8);
                doc.text(`CUIT: ${empresa.cuit || "-"}   Domicilio: ${empresa.domicilio || "-"}`, left + 4, y + 13);
                doc.text(`Actividad: ${empresa.actividad || "Comercio"}`, left + 4, y + 17);

                doc.setFont("helvetica", "bold"); doc.setFontSize(10);
                doc.text("RECIBO DE HABERES", right - 4, y + 8, { align: "right" });
                doc.setFont("helvetica", "normal"); doc.setFontSize(8);
                doc.text("CCT 130/75 — Empleados de Comercio", right - 4, y + 12, { align: "right" });
                doc.setDrawColor(13, 115, 119); doc.setLineWidth(0.6);
                doc.rect(right - 24, y + 15, 20, 5.5);
                doc.setFont("helvetica", "bold"); doc.setFontSize(7.5);
                doc.text(tag, right - 14, y + 19, { align: "center" });

                doc.setDrawColor(20, 20, 20); doc.setLineWidth(0.2);
                doc.line(left, y + 21, right, y + 21);

                // Datos empleado
                doc.setFont("helvetica", "normal"); doc.setFontSize(8.5);
                let ly = y + 27;
                const col1 = left + 4, col2 = left + 95;
                doc.text(`Apellido y Nombre: ${emp.nombre || "-"}`, col1, ly);
                doc.text(`Período: ${liq.periodoLabel || "-"}`, col2, ly);
                ly += 5;
                doc.text(`CUIL: ${emp.cuil || "-"}`, col1, ly);
                doc.text(`Fecha de pago: ${liq.fechaPago || "-"}`, col2, ly);
                ly += 5;
                doc.text(`Legajo: ${emp.legajo || "-"}`, col1, ly);
                doc.text(`Fecha de ingreso: ${emp.fechaIngreso || "-"}`, col2, ly);
                ly += 5;
                doc.text(`Categoría: ${emp.categoria || "-"} · ${JORNADA_LABEL_CORTO[calc.jornada] || "-"}`, col1, ly);
                doc.text(`Antigüedad: ${calc.aniosAntig} año(s)`, col2, ly);

                ly += 4;
                doc.line(left, ly, right, ly);
                ly += 5;

                // Tabla única: Concepto | Remunerativo | No remunerativo | Deducción
                const xRemun = left + 120;
                const xNoRemun = left + 152;
                const xDeduc = right - 4;

                doc.setFont("helvetica", "bold"); doc.setFontSize(7);
                doc.text("CONCEPTO", col1, ly);
                doc.text("REMUNERATIVO", xRemun, ly, { align: "right" });
                doc.text("NO REMUNER.", xNoRemun, ly, { align: "right" });
                doc.text("DEDUCCIÓN", xDeduc, ly, { align: "right" });
                ly += 2;
                doc.setDrawColor(20, 20, 20); doc.setLineWidth(0.2);
                doc.line(col1, ly, xDeduc, ly);
                ly += 3.5;

                doc.setFont("helvetica", "normal"); doc.setFontSize(7.3);
                const filaTabla = (concepto, remun, norem, deduc) => {
                    const r = remun || 0, n = norem || 0, d = deduc || 0;
                    if (Math.abs(r) < 0.005 && Math.abs(n) < 0.005 && Math.abs(d) < 0.005) return;
                    doc.text(concepto, col1, ly);
                    if (Math.abs(r) >= 0.005) doc.text("$ " + fmt(r), xRemun, ly, { align: "right" });
                    if (Math.abs(n) >= 0.005) doc.text("$ " + fmt(n), xNoRemun, ly, { align: "right" });
                    if (Math.abs(d) >= 0.005) doc.text("$ " + fmt(d), xDeduc, ly, { align: "right" });
                    ly += 4.3;
                };

                filaTabla("Sueldo básico", calc.basico, 0, 0);
                filaTabla(`Antigüedad`, calc.antigMonto, 0, 0);
                filaTabla("Presentismo", calc.presentismoMonto, 0, 0);
                filaTabla("Horas extra", (calc.he50 || 0) + (calc.he100 || 0), 0, 0);
                filaTabla(liq.otrosRemunerativosConcepto || "Otras remuneraciones", calc.otrosRemun, 0, 0);
                filaTabla(liq.noRemunerativosConcepto || "Asignación no remunerativa", 0, calc.noRemunerativoBase, 0);
                filaTabla("Antigüedad s/no remunerativo", 0, calc.antigNoRemunMonto, 0);
                filaTabla("Presentismo s/no remunerativo", 0, calc.presentismoNoRemunMonto, 0);
                filaTabla("Jubilación (Ley 24.241) 11%", 0, 0, calc.jubilacion);
                filaTabla("Ley 19.032 (INSSJP/PAMI) 3%", 0, 0, calc.ley19032);
                filaTabla("Obra social 3%", 0, 0, calc.obraSocial);
                filaTabla("Cuota sindical FAECyS 4,5%", 0, 0, calc.sindical);
                filaTabla(liq.otrasDeduccionesConcepto || "Otras deducciones", 0, 0, calc.otrasDeducciones);

                doc.setDrawColor(20, 20, 20); doc.setLineWidth(0.2);
                doc.line(col1, ly - 1.5, xDeduc, ly - 1.5);
                ly += 1;
                doc.setFont("helvetica", "bold"); doc.setFontSize(7.5);
                doc.text("TOTALES", col1, ly);
                doc.text("$ " + fmt(calc.totalRemunerativo), xRemun, ly, { align: "right" });
                doc.text("$ " + fmt(calc.noRemunerativo), xNoRemun, ly, { align: "right" });
                doc.text("$ " + fmt(calc.totalDeducciones), xDeduc, ly, { align: "right" });
                ly += 5.5;

                // Neto — pegado justo debajo de las deducciones, sin espacio muerto,
                // pero sin invadir la zona reservada para las firmas al pie del bloque.
                const netoMinY = ly;
                const netoMaxY = bottom - 28; // deja lugar fijo para el texto "Son:", el texto legal y la firma
                const netoY = Math.min(netoMinY, netoMaxY);

                doc.setDrawColor(20, 20, 20);
                doc.rect(left, netoY, right - left, 8);
                doc.setTextColor(0, 0, 0);
                doc.setFont("helvetica", "bold"); doc.setFontSize(9.5);
                doc.text("NETO A COBRAR", left + 4, netoY + 5.5);
                doc.text("$ " + fmt(calc.neto), right - 4, netoY + 5.5, { align: "right" });
                doc.setTextColor(20, 20, 20);
                doc.setFont("helvetica", "italic"); doc.setFontSize(7);
                doc.text("Son: " + pesosEnLetras(calc.neto), left + 4, netoY + 11.5);

                // Texto legal — pegado justo debajo de "Son: ... pesos"
                doc.setFont("helvetica", "normal"); doc.setFontSize(6.3);
                doc.setTextColor(120, 120, 120);
                const legalTexto = "Art. 138, 139 y 140 - Ley de Contrato de Trabajo N\u00b0 20.744. Este comprobante detalla la totalidad de las remuneraciones y descuentos correspondientes al per\u00edodo indicado.";
                const legalLineas = doc.splitTextToSize(legalTexto, ((right - left) / 2) - 4);
                doc.text(legalLineas, left + 4, netoY + 15.5);
                doc.setTextColor(20, 20, 20);

                // firmas — siempre ancladas al pie del bloque
                doc.setDrawColor(20, 20, 20); doc.setLineWidth(0.2);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(6.5);

                if (tag === "ORIGINAL") {
                    // Solo firma del empleador
                    doc.line(right - 70, y + BLOCK_H - 4, right - 4, y + BLOCK_H - 4);
                    doc.text("Firma y aclaración del empleador", right - 37, y + BLOCK_H - 1.5, { align: "center" });
                } else {
                    // Solo firma del empleado
                    doc.line(right - 70, y + BLOCK_H - 4, right - 4, y + BLOCK_H - 4);
                    doc.text("Recibí conforme — Firma del empleado", right - 37, y + BLOCK_H - 1.5, { align: "center" });
                }
            }

            bloque(y1, "ORIGINAL");
            doc.setLineDashPattern([1.2, 1.2], 0);
            doc.setDrawColor(140, 132, 113);
            doc.line(14, y1 + BLOCK_H + GAP / 2, W - 14, y1 + BLOCK_H + GAP / 2);
            doc.setLineDashPattern([], 0);
            bloque(y2, "DUPLICADO");
        }

        // PDF de un solo empleado (botón "Confirmar y emitir PDF" en Liquidación)
        function generarPDF(empresa, emp, liq, calc) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: "mm", format: "a4" });
            dibujarPaginaRecibo(doc, empresa, emp, liq, calc);
            const nombreArchivo = `Recibo_${(emp.nombre || "empleado").replace(/\s+/g, "_")}_${liq.periodo || "periodo"}.pdf`;
            doc.save(nombreArchivo);
        }

        // PDF con todos los recibos cargados, uno por página, en un solo archivo
        function generarPDFTodos(empresa, empleadosConLiq, escalaGeneral) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: "mm", format: "a4" });
            let periodoRef = "";
            empleadosConLiq.forEach((item, idx) => {
                const { emp, liq } = item;
                const calc = calcularLiquidacion(emp, liq, escalaGeneral);
                if (idx > 0) doc.addPage();
                dibujarPaginaRecibo(doc, empresa, emp, liq, calc);
                if (!periodoRef) periodoRef = liq.periodo;
            });
            const nombreArchivo = `Recibos_${(empresa.razonSocial || "empresa").replace(/\s+/g, "_")}_${periodoRef || "periodo"}.pdf`;
            doc.save(nombreArchivo);
        }

        function App() {
            const [empresa, setEmpresa] = useState({
                razonSocial: "Servicios de Limpieza Ambar SAS",
                cuit: "30-71601678-8",
                domicilio: "Maciel 130 - OF 8",
                actividad: "Servicios de Limpieza"
            });
            const [empleados, setEmpleados] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [tab, setTab] = useState("datos");
            const [liqPorEmpleado, setLiqPorEmpleado] = useState({});
            const [escalaGeneral, setEscalaGeneral] = useState(defaultEscalaGeneral());
            const [vista, setVista] = useState("empleado"); // "empleado" | "escala" | "webhook"
            const [webhookUrl, setWebhookUrl] = useState("");
            const [webhookEnviando, setWebhookEnviando] = useState(false);
            const [webhookLog, setWebhookLog] = useState([]);
            const [toast, setToast] = useState(null);
            const fileInputRef = useRef(null);

            const emp = empleados.find(e => e.id === selectedId) || null;
            const liq = emp ? (liqPorEmpleado[emp.id] || defaultLiq()) : defaultLiq();

            const calc = useMemo(() => emp
                ? calcularLiquidacion(emp, liq, escalaGeneral)
                : calcularLiquidacion({}, defaultLiq(), escalaGeneral),
                [emp, liq, escalaGeneral]);

            function mostrarToast(msg) {
                setToast(msg);
                setTimeout(() => setToast(null), 2600);
            }

            function nuevoEmpleado() {
                const nuevo = {
                    id: uid(), nombre: "", cuil: "", legajo: "", categoria: "", fechaIngreso: "",
                    domicilio: "", afiliadoSindicato: false, jornada: "COMPLETA"
                };
                setEmpleados([...empleados, nuevo]);
                setSelectedId(nuevo.id);
                setTab("datos");
                setVista("empleado");
            }

            function updateEmp(patch) {
                setEmpleados(empleados.map(e => e.id === emp.id ? { ...e, ...patch } : e));
            }

            function updateLiq(patch) {
                setLiqPorEmpleado({ ...liqPorEmpleado, [emp.id]: { ...liq, ...patch } });
            }

            function updateEscalaGeneral(patch) {
                setEscalaGeneral({ ...escalaGeneral, ...patch });
            }

            function borrarEmpleado(id) {
                if (!confirm("¿Eliminar este empleado y su liquidación cargada?")) return;
                setEmpleados(empleados.filter(e => e.id !== id));
                if (selectedId === id) setSelectedId(null);
            }

            function onGenerarPDF() {
                if (!emp.nombre || !liq.periodo || (!calc.usarEscala && !liq.basico) || (calc.usarEscala && !emp.categoria)) {
                    mostrarToast("Completá al menos nombre, categoría/período o sueldo básico antes de emitir el recibo.");
                    return;
                }
                generarPDF(empresa, emp, liq, calc);
                mostrarToast("Recibo generado y descargado ✓");
            }

            function onGenerarTodosPDF() {
                if (empleados.length === 0) {
                    mostrarToast("Todavía no cargaste ningún empleado.");
                    return;
                }
                const empleadosConLiq = empleados.map(e => ({
                    emp: e,
                    liq: liqPorEmpleado[e.id] || defaultLiq()
                }));
                generarPDFTodos(empresa, empleadosConLiq, escalaGeneral);
                mostrarToast(`PDF con ${empleadosConLiq.length} recibo(s) generado ✓`);
            }

            async function onProbarWebhook() {
                if (!webhookUrl) {
                    mostrarToast("Ingresá primero la URL del webhook.");
                    return;
                }
                setWebhookEnviando(true);
                const resultado = await enviarWebhook(webhookUrl, {
                    tipo: "prueba",
                    mensaje: "Conexión de prueba desde Recibos Comercio",
                    fecha_envio: new Date().toISOString(),
                });
                setWebhookEnviando(false);
                mostrarToast(resultado.ok
                    ? "Prueba enviada ✓ — revisá el historial de ejecuciones en Make"
                    : `No se pudo enviar la prueba (${resultado.detalle})`);
            }

            async function onEnviarTodosWebhook() {
                if (!webhookUrl) {
                    mostrarToast("Ingresá primero la URL del webhook.");
                    return;
                }
                if (empleados.length === 0) {
                    mostrarToast("Todavía no cargaste ningún empleado.");
                    return;
                }
                setWebhookEnviando(true);
                setWebhookLog([]);
                const resultados = [];
                for (const e of empleados) {
                    const l = liqPorEmpleado[e.id] || defaultLiq();
                    const c = calcularLiquidacion(e, l, escalaGeneral);
                    const payload = construirPayloadEmpleado(empresa, e, l, c);
                    const r = await enviarWebhook(webhookUrl, payload);
                    resultados.push({ nombre: e.nombre || "(sin nombre)", ok: r.ok, detalle: r.detalle });
                    setWebhookLog([...resultados]);
                    await new Promise(res => setTimeout(res, 150));
                }
                setWebhookEnviando(false);
                const okCount = resultados.filter(r => r.ok).length;
                mostrarToast(`Webhook: ${okCount}/${resultados.length} recibo(s) enviados correctamente`);
            }

            function exportarJSON() {
                const data = { empresa, empleados, liqPorEmpleado, escalaGeneral, webhookUrl };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "empleados_comercio.json"; a.click();
                URL.revokeObjectURL(url);
                mostrarToast("Datos exportados a JSON ✓");
            }

            function importarJSON(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.empresa) setEmpresa(data.empresa);
                        if (data.empleados) setEmpleados(data.empleados);
                        if (data.liqPorEmpleado) setLiqPorEmpleado(data.liqPorEmpleado);
                        if (data.escalaGeneral) setEscalaGeneral({ ...defaultEscalaGeneral(), ...data.escalaGeneral });
                        if (data.webhookUrl) setWebhookUrl(data.webhookUrl);
                        mostrarToast("Datos importados ✓");
                    } catch (err) {
                        mostrarToast("No se pudo leer el archivo JSON.");
                    }
                };
                reader.readAsText(file);
                e.target.value = "";
            }

            return (
                <div className="app">
                    <TopBar empresa={empresa} setEmpresa={setEmpresa} />
                    <div className="layout">
                        <Sidebar empleados={empleados} selectedId={selectedId} vista={vista}
                            onSelect={(id) => { setSelectedId(id); setTab("datos"); setVista("empleado"); }}
                            onNuevo={nuevoEmpleado} onDelete={borrarEmpleado}
                            onVerEscala={() => setVista("escala")}
                            onVerWebhook={() => setVista("webhook")} />
                        <div className="main">
                            {vista === "escala" && (
                                <EscalaGeneralView escalaGeneral={escalaGeneral} updateEscalaGeneral={updateEscalaGeneral} />
                            )}
                            {vista === "webhook" && (
                                <WebhookView webhookUrl={webhookUrl} setWebhookUrl={setWebhookUrl}
                                    onEnviarTodos={onEnviarTodosWebhook} onProbar={onProbarWebhook}
                                    enviando={webhookEnviando} log={webhookLog} cantidadEmpleados={empleados.length} />
                            )}
                            {vista === "empleado" && !emp && (
                                <div className="empty-state">
                                    <span className="mark">Ningún empleado seleccionado</span>
                                </div>
                            )}
                            {vista === "empleado" && emp && (
                                <React.Fragment>
                                    <div className="topline">
                                        <div>
                                            <h1>{emp.nombre || "Nuevo empleado"}</h1>
                                            <div className="sub">{emp.categoria || "Sin categoría asignada"} · {emp.legajo ? "Legajo " + emp.legajo : "Sin legajo"} · {JORNADA_LABEL[emp.jornada || "COMPLETA"]}</div>
                                        </div>
                                        <span className="badge">CCT 130/75</span>
                                    </div>
                                    <div className="tabs">
                                        <div className={"tab" + (tab === "datos" ? " active" : "")} onClick={() => setTab("datos")}>Datos del empleado</div>
                                        <div className={"tab" + (tab === "liquidacion" ? " active" : "")} onClick={() => setTab("liquidacion")}>Liquidación</div>
                                        <div className={"tab" + (tab === "vista" ? " active" : "")} onClick={() => setTab("vista")}>Vista previa del recibo</div>
                                    </div>
                                    {tab === "datos" && <DatosTab emp={emp} updateEmp={updateEmp} />}
                                    {tab === "liquidacion" && <LiquidacionTab emp={emp} liq={liq} updateLiq={updateLiq} calc={calc} onGenerarPDF={onGenerarPDF} />}
                                    {tab === "vista" && <VistaPreviaTab empresa={empresa} emp={emp} liq={liq} calc={calc} />}
                                </React.Fragment>
                            )}
                        </div>
                    </div>
                    <div className="footer-note">
                        Los datos se guardan solo en esta sesión del navegador. Usá "Exportar JSON" para conservarlos
                        y "Importar JSON" para recuperarlos más adelante.
                        <div style={{ marginTop: 8, display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                            <button className="btn btn-primary btn-sm" onClick={onGenerarTodosPDF}>⬇ Descargar todos los recibos (PDF)</button>
                            <button className="btn btn-ghost btn-sm" onClick={exportarJSON}>⇩ Exportar datos (JSON)</button>
                            <button className="btn btn-ghost btn-sm" onClick={() => fileInputRef.current.click()}>⇧ Importar datos (JSON)</button>
                            <input type="file" accept="application/json" ref={fileInputRef} style={{ display: "none" }} onChange={importarJSON} />
                        </div>
                    </div>
                    {toast && <div className="toast">{toast}</div>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
